// ── Detección menor de edad ──
function calcularEdad(dia,mes,anio){
  var hoy=new Date();
  var nac=new Date(parseInt(anio),parseInt(mes)-1,parseInt(dia));
  var edad=hoy.getFullYear()-nac.getFullYear();
  var m=hoy.getMonth()-nac.getMonth();
  if(m<0||(m===0&&hoy.getDate()<nac.getDate())) edad--;
  return edad;
}
function detectarMenorFecha(){
  var d=document.getElementById('diaNac').value;

  var a=document.getElementById('anioNac').value;

  var edad=calcularEdad(d,m,a);
  actualizarMenor(edad<18);
}

function abrirCamara(inputId,okId,boxId){
  // Solicitar permiso de cámara explícitamente
  if(navigator.mediaDevices && navigator.mediaDevices.getUserMedia){
    navigator.mediaDevices.getUserMedia({video:true})
      .then(function(stream){
        // Permiso concedido — detener stream y abrir input con cámara
        stream.getTracks().forEach(function(t){t.stop();});
        var inp=document.getElementById(inputId);
        inp.setAttribute('capture','environment');
        inp.click();
      })
      .catch(function(){
        // Permiso denegado — abrir galería como fallback
        var inp=document.getElementById(inputId);
        inp.removeAttribute('capture');
        inp.click();
        alert('No se pudo acceder a la cámara. Por favor permita el acceso en la configuración de su navegador, o suba la foto desde la galería.');
      });
  } else {
    // Navegador no soporta getUserMedia — abrir file picker normal
    var inp=document.getElementById(inputId);

  }
}

function v(id){var el=document.getElementById(id);if(!el)return true;var ok=el.value.trim()!=='';var em=document.getElementById('e-'+id);if(el)el.classList.toggle('err',!ok);if(em)em.classList.toggle('show',!ok);return ok;}
function validar(n){
  var ok=true;
  if(n===1){
    var dniOk=/^[0-9]{8}$/.test(document.getElementById('dni').value);
    document.getElementById('dni').classList.toggle('err',!dniOk);
    document.getElementById('e-dni').classList.toggle('show',!dniOk);
    if(!dniOk)ok=false;
    ['nombres','apPaterno','apMaterno','estadoCivil','instruccion'].forEach(function(id){if(!v(id))ok=false;});
    if(!document.querySelector('input[name="sexo"]:checked')){document.getElementById('e-sexo').classList.add('show');ok=false;}else document.getElementById('e-sexo').classList.remove('show');
    if(!document.querySelector('input[name="hijos"]:checked')){document.getElementById('e-hijos').classList.add('show');ok=false;}else document.getElementById('e-hijos').classList.remove('show');
    var hv=document.querySelector('input[name="hijos"]:checked');
    if(hv&&hv.value==='Sí'&&!v('cantHijos'))ok=false;
  }
  if(n===2){
    ['diaNac','mesNac','anioNac'].forEach(function(id){if(!v(id))ok=false;});
    detectarMenorFecha();
  }
  if(n===3){['departamento','provincia','distrito','direccion'].forEach(function(id){if(!v(id))ok=false;});}
  if(n===4){
    var celOk=/^[0-9]{9}$/.test(document.getElementById('celular').value);
    document.getElementById('celular').classList.toggle('err',!celOk);document.getElementById('e-celular').classList.toggle('show',!celOk);if(!celOk)ok=false;
    ['email','cargo','emergNombre','emergParentesco'].forEach(function(id){if(!v(id))ok=false;});
    var ecOk=/^[0-9]{9}$/.test(document.getElementById('emergCelular').value);
    document.getElementById('emergCelular').classList.toggle('err',!ecOk);document.getElementById('e-emergCelular').classList.toggle('show',!ecOk);if(!ecOk)ok=false;
    if(!document.querySelector('input[name="sede"]:checked')){document.getElementById('e-sede').classList.add('show');ok=false;}else document.getElementById('e-sede').classList.remove('show');
  }
  if(n===5){
    if(!document.querySelector('input[name="enfermedad"]:checked')){document.getElementById('e-enfermedad').classList.add('show');ok=false;}else document.getElementById('e-enfermedad').classList.remove('show');
    var ev=document.querySelector('input[name="enfermedad"]:checked');
    if(ev&&ev.value==='Sí'&&!v('enfermedadDesc'))ok=false;
    if(!document.querySelector('input[name="pension"]:checked')){document.getElementById('e-pension').classList.add('show');ok=false;}else document.getElementById('e-pension').classList.remove('show');
    var pv=document.querySelector('input[name="pension"]:checked');
    if(pv&&pv.value==='AFP'){if(!document.querySelector('input[name="afpR"]:checked')){document.getElementById('e-afpNombre').classList.add('show');ok=false;}else document.getElementById('e-afpNombre').classList.remove('show');}
    if(pv&&pv.value==='No afiliado'){if(!document.querySelector('input[name="ayudaAfil"]:checked')){document.getElementById('e-ayudaAfil').classList.add('show');ok=false;}else document.getElementById('e-ayudaAfil').classList.remove('show');}
  }
  if(n===6){
    if(esMenor){
      var tcm=document.querySelector('input[name="tieneCuentaMenor"]:checked');
      if(!tcm){document.getElementById('e-tieneCuentaMenor').classList.add('show');ok=false;}
      else{
        document.getElementById('e-tieneCuentaMenor').classList.remove('show');
        // Si tienen cuenta, validar los campos
        if(tcm.value==='Sí'){['banco','numeroCuenta','titularCuenta'].forEach(function(id){if(!v(id))ok=false;});}
        // Si no tienen cuenta, pueden avanzar sin llenar banco
      }
    } else {
      if(!document.querySelector('input[name="tieneCuenta"]:checked')){document.getElementById('e-tieneCuenta').classList.add('show');ok=false;}else document.getElementById('e-tieneCuenta').classList.remove('show');
      var tc=document.querySelector('input[name="tieneCuenta"]:checked');
      if(tc&&tc.value==='Sí'){['banco','numeroCuenta','titularCuenta'].forEach(function(id){if(!v(id))ok=false;});}
    }
  }
  if(n===7){
    if(esMenor){
      ['apodNombre','apodParentesco','apodBanco','apodCuenta'].forEach(function(id){if(!v(id))ok=false;});
      var adniOk=/^[0-9]{8}$/.test(document.getElementById('apodDni').value);
      document.getElementById('apodDni').classList.toggle('err',!adniOk);document.getElementById('e-apodDni').classList.toggle('show',!adniOk);if(!adniOk)ok=false;
      var acOk=/^[0-9]{9}$/.test(document.getElementById('apodCelular').value);
      document.getElementById('apodCelular').classList.toggle('err',!acOk);document.getElementById('e-apodCelular').classList.toggle('show',!acOk);if(!acOk)ok=false;
    } else {
      // Para mayores, paso 7 tiene las fotos
      var fA=document.getElementById('fotoAnverso').files[0];
      var fR=document.getElementById('fotoReverso').files[0];
      if(!fA){document.getElementById('e-fotoA').classList.add('show');ok=false;}else document.getElementById('e-fotoA').classList.remove('show');
      if(!fR){document.getElementById('e-fotoR').classList.add('show');ok=false;}else document.getElementById('e-fotoR').classList.remove('show');
    }
  }
  if(n===8){
    var sinDni=document.getElementById('sinDni').checked;
    if(!sinDni){
      var fA2=document.getElementById('fotoAnverso2').files[0];
      var fR2=document.getElementById('fotoReverso2').files[0];
      if(!fA2){document.getElementById('e-fotoA2').classList.add('show');ok=false;}else document.getElementById('e-fotoA2').classList.remove('show');
      if(!fR2){document.getElementById('e-fotoR2').classList.add('show');ok=false;}else document.getElementById('e-fotoR2').classList.remove('show');
    } else {
      document.getElementById('e-fotoA2').classList.remove('show');
      document.getElementById('e-fotoR2').classList.remove('show');
    }
    if(!document.getElementById('declaracion').checked){document.getElementById('e-decl').classList.add('show');ok=false;}else document.getElementById('e-decl').classList.remove('show');
  }
  return ok;
}

// ── Comprimir imagen ──
function comprimirImagen(file){
  return new Promise(function(resolve){
    if(!file){resolve(null);return;}
    if(file.type==='application/pdf'){var r=new FileReader();r.onload=function(e){resolve({b64:e.target.result.split(',')[1],tipo:'application/pdf',nombre:file.name});};r.readAsDataURL(file);return;}
    var img=new Image();var url=URL.createObjectURL(file);
    img.onload=function(){
      var MAX=1200;var w=img.width,h=img.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      var canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      var dataUrl=canvas.toDataURL('image/jpeg',0.78);
      resolve({b64:dataUrl.split(',')[1],tipo:'image/jpeg',nombre:file.name.replace(/\.[^.]+$/,'.jpg')});
    };
    img.onerror=function(){var r=new FileReader();r.onload=function(e){resolve({b64:e.target.result.split(',')[1],tipo:file.type,nombre:file.name});};r.readAsDataURL(file);};
    img.src=url;
  });
}

}

    window.scrollTo({top:0,behavior:'smooth'});
  },4000);
}
</script>
